name: Quality Checks

on:
  pull_request:
    branches: [main]
    paths:
      - '_data/**'
      - '_layouts/**'
      - '*.html'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - '_config.yml'
      - '.github/workflows/quality.yml'
  push:
    branches: [main]
    paths:
      - '_data/**'
      - '_layouts/**'
      - '*.html'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - '_config.yml'
      - '.github/workflows/quality.yml'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run quality checks
        run: bash scripts/check/run-all-checks.sh

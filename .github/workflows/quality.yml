name: Quality Checks

on:
  pull_request:
    branches: [main]
    paths:
      - '_data/**'
      - '_layouts/**'
      - '_includes/**'
      - '_notes/**'
      - '_posts/**'
      - '_stories/**'
      - '_pages/**'
      - '*.html'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '_config.yml'
      - '.github/workflows/quality.yml'
  push:
    branches: [main]
    paths:
      - '_data/**'
      - '_layouts/**'
      - '_includes/**'
      - '_notes/**'
      - '_posts/**'
      - '_stories/**'
      - '_pages/**'
      - '*.html'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '_config.yml'
      - '.github/workflows/quality.yml'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install required CLI tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep jq

      - name: Run full project verification
        run: npm run test:full
